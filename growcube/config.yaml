name: GrowCube
version: "0.2.6"
slug: growcube
description: GrowCube device bridge for Home Assistant OS
url: https://github.com/lilbouu/GrowCube_Ha_App
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ingress: false
homeassistant_api: false
host_network: true
services:
  - mqtt:need
options:
  devices: []
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
schema:
  devices:
    - name: str
      host: str
      port: "int?"
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: password?
ports: {}
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
