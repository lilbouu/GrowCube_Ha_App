name: GrowCube
version: "0.1.0"
slug: growcube
description: Standalone GrowCube controller for Home Assistant OS
url: https://github.com/lilbouu/GrowCube_Ha_App
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:sprout
panel_title: GrowCube
homeassistant_api: false
host_network: true
options:
