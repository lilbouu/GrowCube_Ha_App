name: GrowCube
version: "0.2.82"
slug: growcube
description: GrowCube device bridge for Home Assistant OS
url: https://github.com/lilbouu/GrowCube_Ha_App
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:sprout
panel_title: GrowCube
hassio_api: true
homeassistant_api: true
host_network: true
services:
  - mqtt:need
options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  devices: []
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: password?
  devices:
    - name: str
      host: str
      port: int?
map:
  - addon_config:rw
  - config:rw
