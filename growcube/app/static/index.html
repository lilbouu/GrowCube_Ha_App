<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GrowCube</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>GrowCube</h1>
          <p>Standalone HAOS controller</p>
        </div>
        <button id="refresh" type="button" title="Refresh">Refresh</button>
      </header>

      <section class="panel setup">
        <h2>Add GrowCube</h2>
        <form id="device-form">
          <label>
            Name
            <input name="name" placeholder="GrowCube">
          </label>
          <label>
            Host or IP
            <input name="host" placeholder="192.168.1.50" required>
          </label>
          <label>
            Port
            <input name="port" type="number" min="1" max="65535" value="8800">
          </label>
          <button type="submit">Add and connect</button>
        </form>
      </section>

      <section id="devices" class="devices"></section>
      <section id="empty" class="panel empty" hidden>
        <h2>No devices yet</h2>
        <p>Add a GrowCube by IP address to start monitoring and watering.</p>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
